# Ratatoskr E2E - E2E-09 (setup): start the book on the fake speaker again so there is a live
# session to kill. Same navigation as the P1 spine (library row -> speaker picker -> Now-playing);
# a stale access token is fine here - ABS is up, so a 401 silently refreshes.
appId: io.github.xexanos.ratatoskr
---
- launchApp                    # cold start routes to the library (signed in)
- assertVisible:
    id: "library_row"
- tapOn:
    id: "library_row"
    index: 0
- assertVisible: "Choose a speaker"
- tapOn:
    id: "speaker_row"
    index: 0                   # the fake speaker - this tap starts playback
- assertVisible: "Pause"       # Now-playing, PLAYING
