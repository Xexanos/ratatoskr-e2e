# Ratatoskr E2E - E2E-05 pause (test-concept.md §5). Runs attached (no launchApp - see
# p1-stop.yaml for why) after assert-abs-progress.sh, which needs the session still PLAYING;
# this flow pauses it (verified on the speaker by assert-fake-transport.sh PAUSED_PLAYBACK), then
# p1-resume.yaml plays again so p1-stop.yaml exercises Stop from PLAYING.
#
# The taps below only prove the UI toggled. The real check is host-side right after this flow:
# assert-fake-transport.sh PAUSED_PLAYBACK asks the fake over SOAP whether the Pause actually
# landed on the speaker - an app that toggles its button optimistically over a broken SOAP
# Pause path fails there, not here.
appId: io.github.xexanos.ratatoskr
---
- assertVisible: "Pause"       # on Now-playing, still PLAYING
- tapOn: "Pause"
- assertVisible: "Play"        # UI toggled to paused
