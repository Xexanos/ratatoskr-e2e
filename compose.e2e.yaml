# E2E stack for the Ratatoskr cross-component suite (test-concept.md §4).
#
# Three real services on one bridge network: Audiobookshelf, the fake Sonos speaker, and the
# Ratatoskr server. The Android app is NOT here - it runs on an emulator and reaches the server
# via `adb reverse` (see scripts/run-e2e.sh).
#
# Image refs are injected by the harness (test-concept.md §6). SERVER_IMAGE is pinned by digest
# (from the server-image dispatch payload), and ABS_IMAGE defaults to a pinned digest here.
# FAKE_SONOS_IMAGE tracks the fake's own :latest by default - it is published on its own cadence,
# not per server commit - unless a digest is pinned (see scripts/fetch-artifacts.sh).
#
# Start order matters: the server validates ABS_STREAMER_API_KEY against ABS at startup, so ABS
# must be seeded before the server starts. run-e2e.sh therefore brings up `abs` + `fake-sonos`
# first, seeds ABS, then brings up `ratatoskr` with the seeded key. Do not add a depends_on that
# would start the server early.

services:
  abs:
    image: ${ABS_IMAGE:-ghcr.io/advplyr/audiobookshelf@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d}
    environment:
      PORT: "13378"
      # Short-lived access tokens (seconds; ABS TokenManager env). This forces the whole
      # token-rotation machinery through the run instead of leaving it dormant behind the 1h
      # default: mid-session the TTL is inside the server's LISTENING_TOKEN_REFRESH_MARGIN
      # (300s), so the server rotates the listening tokens and hands them to the app via
      # Session.rotatedTokens (E2E-08's "active session continues"), and after the session the
      # p2-refresh flow cold-starts on a guaranteed-expired token to prove the silent 401 ->
      # /v1/auth/refresh path (E2E-08 proper). seed-abs.sh re-logs-in after its slowest step so
      # seeding never trips over the short TTL.
      ACCESS_TOKEN_EXPIRY: "90"
    volumes:
      # The fixture audiobook the seeding step scans (generated by scripts/make-fixture.sh).
      - ./fixtures/audiobooks:/audiobooks:ro

  fake-sonos:
    image: ${FAKE_SONOS_IMAGE:?set FAKE_SONOS_IMAGE (ghcr.io/xexanos/ratatoskr-fake-sonos:latest or @sha256:…)}
    environment:
      PORT: "1400"
      # The zone-group Location URL the fake advertises must be reachable by the server, so it
      # must be the address the server uses to reach the fake - the compose service name.
      ADVERTISE_HOST: fake-sonos
      ROOM_NAME: E2E Test Room
      # Advance RelTime with the wall clock while PLAYING, so a real session's position moves and
      # the server syncs it back to ABS (E2E-06). Test-only; the fake defaults to a static position.
      FAKE_ADVANCE: "1"
    ports:
      # Published so the harness can query the fake's AVTransport state over SOAP directly
      # (assert-fake-transport.sh, E2E-05 stop). The server still reaches it over the bridge as
      # fake-sonos:1400 - this only adds host access.
      - "1400:1400"

  ratatoskr:
    image: ${SERVER_IMAGE:?set SERVER_IMAGE (ghcr.io/xexanos/ratatoskr-server@sha256:<digest>)}
    environment:
      # ABS is reached over the internal bridge; plain HTTP is fine inside the compose network.
      ABS_URL: http://abs:13378
      ABS_ALLOW_PLAIN_HTTP: "true"
      # Set by run-e2e.sh after seeding (the stream-only account's API key).
      ABS_STREAMER_API_KEY: ${ABS_STREAMER_API_KEY:?seed ABS first; run-e2e.sh sets this}
      # Point the server straight at the fake over unicast - no SSDP multicast on a bridge.
      SONOS_SEED_HOST: fake-sonos:1400
      SONOS_DISABLE_EVENTS: "1"
      PORT: "8080"
      # Fast sync so a short E2E sees progress written back quickly (server integration tuning).
      POLL_INTERVAL_SECONDS: "2"
      PROGRESS_WRITE_THRESHOLD_SECONDS: "1"
      SEEK_SETTLE_MS: "200"
      RESUME_REWIND_SECONDS: "0"
      WRITE_POSITION_BACKOFF_SECONDS: "0"
      # No TLS_CERT_PATH/TLS_KEY_PATH and no ALLOW_PLAIN_HTTP -> the image entrypoint generates a
      # self-signed cert and serves HTTPS; the app trusts it on first connect (TOFU). A fresh cert
      # per run is fine: each run installs a clean app and confirms the fingerprint anew.
    ports:
      # The app (on the emulator) reaches this via `adb reverse tcp:8080 tcp:8080` -> localhost:8080.
      - "8080:8080"
    depends_on:
      - abs
      - fake-sonos
